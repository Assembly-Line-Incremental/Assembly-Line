name: CI/CD

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    # ── Quality checks ───────────────────────────────────────────────
    lint:
        name: Lint & Format
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: bun install --frozen-lockfile
            - run: bun run lint
            - run: bun run format:check

    typecheck:
        name: Type Check
        runs-on: ubuntu-latest
        env:
            SKIP_ENV_VALIDATION: true
            DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: bun install --frozen-lockfile
            - run: bun run --cwd packages/db generate
            - run: bun run typecheck

    # ── Deploy web (Vercel) ───────────────────────────────────────────
    deploy-preview:
        name: Deploy Preview
        needs: [lint, typecheck]
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
        env:
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        steps:
            - uses: actions/checkout@v4
            - id: branch-slug
              run: echo "slug=$(echo '${{ github.head_ref }}' | sed 's/\//-/g' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
            - id: deploy
              uses: amondnet/vercel-action@v25
              with:
                  vercel-token: ${{ secrets.VERCEL_TOKEN }}
                  vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
                  vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
                  scope: ${{ secrets.VERCEL_ORG_ID }}
                  # Root Directory must be set to apps/web in Vercel project settings
                  alias-domains: |
                      ${{ steps.branch-slug.outputs.slug }}.hrp.assembly-line.fr
            - name: Comment preview URL on PR
              uses: actions/github-script@v7
              with:
                  script: |
                      const url = `https://${{ steps.branch-slug.outputs.slug }}.hrp.assembly-line.fr`;
                      const marker = '<!-- preview-deploy -->';
                      const body = `${marker}\n🚀 **Preview deployed:** [${url}](${url})`;
                      const { data: comments } = await github.rest.issues.listComments({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                      });
                      const existing = comments.find(c => c.body?.includes(marker));
                      if (existing) {
                          await github.rest.issues.updateComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              comment_id: existing.id,
                              body,
                          });
                      } else {
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: context.issue.number,
                              body,
                          });
                      }

    deploy-staging:
        name: Deploy Staging
        needs: [lint, typecheck]
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        runs-on: ubuntu-latest
        env:
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        steps:
            - uses: actions/checkout@v4
            - id: deploy
              uses: amondnet/vercel-action@v25
              with:
                  vercel-token: ${{ secrets.VERCEL_TOKEN }}
                  vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
                  vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
                  scope: ${{ secrets.VERCEL_ORG_ID }}
                  alias-domains: |
                      develop.hrp.assembly-line.fr
            - run: echo "Staging URL → ${{ steps.deploy.outputs.preview-url }}"

    deploy-production:
        name: Deploy Production
        needs: [lint, typecheck]
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        env:
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        steps:
            - uses: actions/checkout@v4
            - uses: amondnet/vercel-action@v25
              with:
                  vercel-token: ${{ secrets.VERCEL_TOKEN }}
                  vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
                  vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
                  vercel-args: "--prod"
                  scope: ${{ secrets.VERCEL_ORG_ID }}

    # ── Deploy api (Railway) ──────────────────────────────────────────
    deploy-api-staging:
        name: Deploy API Staging (Railway)
        needs: [lint, typecheck]
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Deploy to Railway (staging)
              run: npx @railway/cli@latest up --service assembly-line-api --detach
              env:
                  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}

    deploy-api-production:
        name: Deploy API Production (Railway)
        needs: [lint, typecheck]
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Deploy to Railway (production)
              run: npx @railway/cli@latest up --service assembly-line-api --detach
              env:
                  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
